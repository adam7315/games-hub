<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>教學遊戲平台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}

header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);padding:32px 24px 28px;text-align:center;color:#fff}
header h1{font-size:24px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
header p{font-size:13px;color:rgba(255,255,255,.55)}

.filter-bar{display:flex;justify-content:center;gap:8px;padding:20px 16px 8px}
.filter-btn{padding:7px 18px;border:1.5px solid #c8d0e0;border-radius:20px;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:.2s}
.filter-btn.active{background:#0f3460;border-color:#0f3460;color:#fff;font-weight:600}

.total-row{text-align:center;font-size:13px;color:#888;margin:4px 0 20px}
.total-row span{font-weight:600;color:#0f3460}

.section{max-width:720px;margin:0 auto 32px;padding:0 16px}
.section-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;border-bottom:2px solid #e0e5ef;padding-bottom:8px;margin-bottom:14px}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;transition:.2s;cursor:pointer;text-decoration:none;display:block;color:inherit}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
.card-img{height:120px;display:flex;align-items:center;justify-content:center;font-size:52px}
.card-body{padding:14px 16px 16px}
.card-name{font-size:15px;font-weight:700;margin-bottom:4px}
.card-desc{font-size:12px;color:#888;margin-bottom:12px;line-height:1.5}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.play-btn{background:#0f3460;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer}
.view-count{font-size:12px;color:#aaa;display:flex;align-items:center;gap:4px}
.view-count svg{width:14px;height:14px;fill:#bbb}

.loading{text-align:center;color:#aaa;font-size:13px;padding:40px}
</style>
</head>
<body>

<header>
  <h1>🎮 教學遊戲平台</h1>
  <p>互動式課堂遊戲集合</p>
</header>

<div class="filter-bar">
  <button class="filter-btn" onclick="setFilter('all')">全部時間</button>
  <button class="filter-btn" onclick="setFilter('6months')">近半年</button>
  <button class="filter-btn active" onclick="setFilter('1month')">近一個月</button>
</div>
<div class="total-row">總點閱 <span id="total-count">—</span> 次</div>

<div id="game-list"><div class="loading">載入中…</div></div>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx_Xy7gy0lVSpHHwGRoG6pI_pM95PTfQA6zSAfTcerjM3WBbtUHUfw-AH_nKePQ9gstgw/exec';

const GAMES = [
  {
    id: 'water-memory-game',
    name: '水資源記憶配對遊戲',
    desc: '藍隊 vs 紅隊翻牌配對對戰，3D動畫音效',
    emoji: '💧',
    category: '水資源遊戲',
    url: 'https://adam7315.github.io/water-memory-game/'
  },
  {
    id: 'water-quiz-game',
    name: '水資源管理策略課後大挑戰',
    desc: '轉盤決定難度，隨機抽題，30秒倒數搶答',
    emoji: '🌊',
    category: '水資源遊戲',
    url: 'https://adam7315.github.io/water-quiz-game/'
  },
  {
    id: 'food-web-game',
    name: '海洋食物網遊戲',
    desc: '探索海洋生態系中的食物鏈關係',
    emoji: '🐠',
    category: '海洋科學遊戲',
    url: 'https://adam7315.github.io/food-web-game/'
  }
];

let countsData = {};
let currentFilter = '1month';

function setFilter(period) {
  currentFilter = period;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadCounts(period);
}

async function loadCounts(period) {
  try {
    const res = await fetch(`${WEB_APP_URL}?action=counts&period=${period}`);
    const data = await res.json();
    countsData = {};
    (data.counts || []).forEach(c => { countsData[c.game_id] = c.count; });
  } catch(e) {
    countsData = {};
  }
  renderGames();
}

function renderGames() {
  const categories = [...new Set(GAMES.map(g => g.category))];
  let total = 0;
  Object.values(countsData).forEach(v => total += v);
  document.getElementById('total-count').textContent = total.toLocaleString();

  const html = categories.map(cat => {
    const games = GAMES.filter(g => g.category === cat);
    const cards = games.map(g => {
      const count = countsData[g.id] || 0;
      return `
      <a class="card" href="javascript:void(0)" onclick="playGame('${g.id}','${encodeURIComponent(g.name)}','${encodeURIComponent(g.category)}','${g.url}')">
        <div class="card-img" style="background:${catColor(cat)}">${g.emoji}</div>
        <div class="card-body">
          <div class="card-name">${g.name}</div>
          <div class="card-desc">${g.desc}</div>
          <div class="card-footer">
            <button class="play-btn" onclick="event.stopPropagation();playGame('${g.id}','${encodeURIComponent(g.name)}','${encodeURIComponent(g.category)}','${g.url}')">▶ 開始遊戲</button>
            <div class="view-count">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              ${count.toLocaleString()} 次
            </div>
          </div>
        </div>
      </a>`;
    }).join('');
    return `<div class="section"><div class="section-title">${cat}</div><div class="cards">${cards}</div></div>`;
  }).join('');

  document.getElementById('game-list').innerHTML = html;
}

function playGame(id, nameEnc, catEnc, url) {
  const name = decodeURIComponent(nameEnc);
  const cat  = decodeURIComponent(catEnc);
  // 記錄點擊（fire and forget）
  if (WEB_APP_URL !== 'APPS_SCRIPT_URL_PLACEHOLDER') {
    fetch(`${WEB_APP_URL}?action=log&game_id=${id}&game_name=${encodeURIComponent(name)}&category=${encodeURIComponent(cat)}`).catch(()=>{});
  }
  window.open(url, '_blank');
}

function catColor(cat) {
  const colors = {
    '水資源遊戲': 'linear-gradient(135deg,#e0f2fe,#bae6fd)',
    '海洋科學遊戲': 'linear-gradient(135deg,#d1fae5,#a7f3d0)'
  };
  return colors[cat] || '#f3f4f6';
}

// 初始載入
loadCounts('1month');
</script>
</body>
</html>
