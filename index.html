<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>教學遊戲平台</title>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-81V8TQ0Y76"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-81V8TQ0Y76');
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

/* ── Hero ── */
.hero{position:relative;padding:52px 24px 44px;text-align:center;overflow:hidden;background:linear-gradient(160deg,#0d1b2a 0%,#0f2a45 50%,#0d1b2a 100%)}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-badge{display:inline-block;background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.3);color:#38bdf8;font-size:11px;font-weight:600;letter-spacing:2px;padding:4px 12px;border-radius:20px;margin-bottom:16px;text-transform:uppercase}
.hero h1{font-size:32px;font-weight:800;letter-spacing:-0.5px;margin-bottom:10px;background:linear-gradient(135deg,#e0f2fe,#7dd3fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:14px;color:rgba(255,255,255,.45);max-width:400px;margin:0 auto 28px;line-height:1.6}
.hero-stats{display:flex;justify-content:center;gap:32px}
.stat{text-align:center}
.stat-num{font-size:26px;font-weight:800;color:#38bdf8;line-height:1}
.stat-label{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.5px}

/* ── Filter ── */
.filter-wrap{display:flex;justify-content:center;align-items:center;gap:6px;padding:20px 16px 12px}
.filter-label{font-size:11px;color:#8b949e;margin-right:4px}
.filter-btn{padding:6px 16px;border:1px solid #30363d;border-radius:20px;background:transparent;color:#8b949e;font-size:12px;cursor:pointer;transition:.2s}
.filter-btn.active{background:#1d6fa4;border-color:#1d6fa4;color:#fff;font-weight:600}
.filter-btn:hover:not(.active){border-color:#58a6ff;color:#58a6ff}

/* ── Category Section ── */
.cat-section{max-width:800px;margin:0 auto 48px;padding:0 16px}

/* 水資源 theme */
.cat-water .cat-header{background:linear-gradient(135deg,#0c2340 0%,#0e3a6e 50%,#1a5276 100%);border:1px solid #1e4976}
.cat-water .cat-tag{background:rgba(56,189,248,.2);color:#7dd3fc;border-color:rgba(56,189,248,.3)}
.cat-water .card:hover{border-color:#38bdf8;box-shadow:0 0 24px rgba(56,189,248,.15)}
.cat-water .play-btn{background:linear-gradient(135deg,#1d6fa4,#2563eb)}
.cat-water .card-img{background:linear-gradient(135deg,#0c2340,#1e4976)}

/* 海洋科學 theme */
.cat-ocean .cat-header{background:linear-gradient(135deg,#0a2a1a 0%,#0d4a2a 50%,#145a35 100%);border:1px solid #1a5c35}
.cat-ocean .cat-tag{background:rgba(52,211,153,.2);color:#6ee7b7;border-color:rgba(52,211,153,.3)}
.cat-ocean .card:hover{border-color:#34d399;box-shadow:0 0 24px rgba(52,211,153,.15)}
.cat-ocean .play-btn{background:linear-gradient(135deg,#065f46,#059669)}
.cat-ocean .card-img{background:linear-gradient(135deg,#0a2a1a,#0d4a2a)}

.cat-header{border-radius:16px 16px 0 0;padding:20px 24px;display:flex;align-items:center;gap:14px}
.cat-icon{font-size:32px}
.cat-info h2{font-size:18px;font-weight:700;margin-bottom:4px}
.cat-info p{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}
.cat-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:1px;padding:2px 8px;border-radius:10px;border:1px solid;margin-top:6px;text-transform:uppercase}
.cat-count{margin-left:auto;text-align:right}
.cat-count-num{font-size:22px;font-weight:800;color:#fff}
.cat-count-label{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

.cards-wrap{background:#161b22;border:1px solid #30363d;border-top:none;border-radius:0 0 16px 16px;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

.card{background:#0d1117;border:1px solid #21262d;border-radius:12px;overflow:hidden;transition:.25s;cursor:pointer;text-decoration:none;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px)}
.card-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
.card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.4))}
.card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.card-name{font-size:14px;font-weight:700;margin-bottom:6px;color:#e6edf3;line-height:1.4}
.card-desc{font-size:12px;color:#8b949e;margin-bottom:14px;line-height:1.6;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
.play-btn{color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.3px}
.view-count{font-size:12px;color:#6e7681;display:flex;align-items:center;gap:4px;white-space:nowrap}
.view-count svg{width:13px;height:13px;fill:#6e7681;flex-shrink:0}

/* ── Footer ── */
footer{text-align:center;padding:32px 16px;color:#484f58;font-size:12px}

.loading{text-align:center;color:#484f58;font-size:13px;padding:40px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">Interactive Learning Platform</div>
  <h1>教學遊戲平台</h1>
  <p>水資源管理與海洋科學互動式課堂遊戲，讓學習更有趣</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">遊戲點擊次數</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-label">款遊戲</div></div>
  </div>
</div>

<div class="filter-wrap">
  <span class="filter-label">統計區間</span>
  <button class="filter-btn" onclick="setFilter('all',this)">全部時間</button>
  <button class="filter-btn" onclick="setFilter('6months',this)">近半年</button>
  <button class="filter-btn active" onclick="setFilter('1month',this)">近一個月</button>
</div>

<div id="game-list"><div class="loading">載入中…</div></div>

<footer>教學遊戲平台 · 水資源 × 海洋科學</footer>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzfT8yepTs4gw8Vjws7gUrUNxtrYsUA4dxCyTuceLrYBVl78LZy02IwLCpNJnqM-eUgyQ/exec';

const CAT_META = {
  '水資源遊戲':  { cls:'cat-water', icon:'💧', desc:'台南海淡廠水資源教育課程，以遊戲化方式傳遞水資源管理知識', tag:'Water Resources' },
  '海洋科學遊戲':{ cls:'cat-ocean', icon:'🌊', desc:'OSS 海洋科學開箱教學計畫，互動遊戲輔助海洋生態概念學習', tag:'Ocean Science' }
};

let GAMES = [];
let countsData = {};
let currentFilter = '1month';

function setFilter(period, btn) {
  currentFilter = period;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadCounts(period);
}

async function init() {
  // 同時抓遊戲清單 + 點閱數
  const [gRes, cRes] = await Promise.all([
    fetch(`${WEB_APP_URL}?action=games`).then(r=>r.json()).catch(()=>({games:[]})),
    fetch(`${WEB_APP_URL}?action=counts&period=1month`).then(r=>r.json()).catch(()=>({counts:[]}))
  ]);
  GAMES = gRes.games || [];
  countsData = {};
  (cRes.counts || []).forEach(c => { countsData[c.game_id] = c.count; });
  renderGames();
}

async function loadCounts(period) {
  try {
    const data = await fetch(`${WEB_APP_URL}?action=counts&period=${period}`).then(r=>r.json());
    countsData = {};
    (data.counts || []).forEach(c => { countsData[c.game_id] = c.count; });
  } catch(e) { countsData = {}; }
  renderGames();
}

function renderGames() {
  if (!GAMES.length) {
    document.getElementById('game-list').innerHTML = '<div class="loading">載入中…</div>';
    return;
  }
  const categories = [...new Set(GAMES.map(g => g.category))];
  let total = 0;
  Object.values(countsData).forEach(v => total += v);
  document.getElementById('total-count').textContent = total.toLocaleString();

  const html = categories.map(cat => {
    const meta = CAT_META[cat] || { cls:'cat-water', icon:'🎮', desc:'', tag:'' };
    const games = GAMES.filter(g => g.category === cat);
    const catTotal = games.reduce((s, g) => s + (countsData[g.id] || 0), 0);

    const cards = games.map(g => {
      const count = countsData[g.id] || 0;
      return `
      <div class="card" onclick="playGame('${g.id}','${encodeURIComponent(g.name)}','${encodeURIComponent(g.category)}','${encodeURIComponent(g.url)}')">
        <div class="card-img">${g.emoji}</div>
        <div class="card-body">
          <div class="card-name">${g.name}</div>
          <div class="card-desc">${g.desc}</div>
          <div class="card-footer">
            <button class="play-btn" onclick="event.stopPropagation();playGame('${g.id}','${encodeURIComponent(g.name)}','${encodeURIComponent(g.category)}','${encodeURIComponent(g.url)}')">▶ 開始遊戲</button>
            <div class="view-count">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              ${count.toLocaleString()}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="cat-section ${meta.cls}">
      <div class="cat-header">
        <div class="cat-icon">${meta.icon}</div>
        <div class="cat-info">
          <h2>${cat}</h2>
          <p>${meta.desc}</p>
          <span class="cat-tag">${meta.tag}</span>
        </div>
        <div class="cat-count">
          <div class="cat-count-num">${catTotal.toLocaleString()}</div>
          <div class="cat-count-label">本期點閱</div>
        </div>
      </div>
      <div class="cards-wrap">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('game-list').innerHTML = html;
}

function playGame(id, nameEnc, catEnc, urlEnc) {
  const name = decodeURIComponent(nameEnc);
  const cat  = decodeURIComponent(catEnc);
  const url  = decodeURIComponent(urlEnc);
  fetch(`${WEB_APP_URL}?action=log&game_id=${id}&game_name=${encodeURIComponent(name)}&category=${encodeURIComponent(cat)}`).catch(()=>{});
  window.open(url, '_blank');
}

init();
</script>
</body>
</html>
